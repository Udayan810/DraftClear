<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DraftClear - Sign Up</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
    <style>
        .error-msg { color: #ea4335; font-size: 0.85rem; margin-top: 0.5rem; text-align: center; display: none;}
        .success-msg { color: #27ae60; font-size: 0.85rem; margin-top: 0.5rem; text-align: center; display: none;}
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="background-elements">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
        
        <div class="login-container">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-cube"></i> DraftClear
                </div>
                <h2>Create an Account</h2>
                <p>Join DraftClear for AI-Powered CAD Intelligence</p>
            </div>
            
            <form class="login-form" id="signupForm">
                <div class="input-group">
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <input type="email" id="email" required autocomplete="email">
                    <label for="email">Email Address</label>
                </div>
                
                <div class="input-group">
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                    </div>
                    <input type="password" id="password" required autocomplete="new-password">
                    <label for="password">Password</label>
                    <button type="button" class="toggle-password" id="togglePassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>

                <div class="input-group">
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                    </div>
                    <input type="password" id="confirmPassword" required autocomplete="new-password">
                    <label for="confirmPassword">Confirm Password</label>
                </div>

                <div id="errorMsg" class="error-msg"></div>
                <div id="successMsg" class="success-msg"></div>
                
                <button type="submit" class="submit-btn" id="submitBtn">
                    <span>Sign Up</span>
                    <i class="fas fa-user-plus"></i>
                </button>
                
                <div class="divider">
                    <span>OR CONTINUE WITH</span>
                </div>
                
                <div class="social-login">
                    <button type="button" class="social-btn">
                        <i class="fab fa-microsoft"></i> Microsoft
                    </button>
                    <button type="button" class="social-btn">
                        <i class="fab fa-google"></i> Google
                    </button>
                </div>
            </form>
            
            <div class="login-footer">
                <p>Already have an account? <a href="login.html">Sign In</a></p>
            </div>
        </div>
    </div>
    
    <script>
        // Password toggle
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // Form submission
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const btn = document.getElementById('submitBtn');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (password !== confirmPassword) {
                errorMsg.textContent = "Passwords do not match.";
                errorMsg.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorMsg.textContent = "Password must be at least 6 characters.";
                errorMsg.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    successMsg.textContent = "Registration successful! Redirecting to login...";
                    successMsg.style.display = 'block';
                    setTimeout(() => window.location.href = 'login.html', 1500);
                } else {
                    const data = await response.json();
                    throw new Error(data.detail || "Registration failed");
                }
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<span>Sign Up</span> <i class="fas fa-user-plus"></i>';
            }
        });
    </script>
</body>
</html>
