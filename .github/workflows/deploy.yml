name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            APP_DIR="$HOME/DraftClear"

            # Clone repo if it doesn't exist yet
            if [ ! -d "$APP_DIR" ]; then
              git clone https://github.com/${{ github.repository }}.git "$APP_DIR"
            fi

            cd "$APP_DIR"

            # Pull latest changes
            git fetch origin main
            git reset --hard origin/main

            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker $USER
            fi

            # Install Docker Compose plugin if not present
            if ! docker compose version &> /dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y docker-compose-plugin
            fi

            # Rebuild and restart the container
            docker compose down --remove-orphans || true
            docker compose up -d --build

            # Remove dangling images to free disk space
            docker image prune -f

            echo "Deployment complete — DraftClear is running on port 8000"
